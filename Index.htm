<html>
    <head>
        <title>
            Jumbotron and Buttons
        </title>
        
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>

    </head>

    <body style="background:linear-gradient(rgb(89, 5, 40), rgba(231, 3, 67, 0.879))">
        <div class="jumbotron" style="text-align:center; font-size:40px;">
            Codingal
        </div>

        <div style="text-align:center">
            <span><button type="button" class="btn btn-primary">Projects</button></span>
            <span><button type="button" class="btn btn-info">Notifications</button></span>
            <span><button type="button" class="btn btn-dark">Quizzes</button></span>
            <span><button type="button" class="btn btn-danger">Competitions</button></span>

        </div>


        <div>
            <span class="badge badge-primary" style="margin-left:120px">None Left</span>
            <span class="badge badge-info" style="margin-left:20px;">1 Notification</span>
            <span class="badge badge-dark" style="margin-left:40px;">1 left</span>
            <span class="badge badge-danger" style="margin-left:60px">10</span>
        </div><br>

        <div>
            <div class="progress" style="width:100%"><span class="progress" style="width:70%; background-color:aqua"><span style="color:blueviolet; font-size:14px;">70%</span></span></div>
        </div>

    </body>

</html>
